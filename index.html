<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWOF Deck Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PptxGenJS/3.12.0/pptxgen.bundle.min.js"
        onerror="loadPptxFallback()"></script>
<script>
/* non-blocking fallback: no document.write, so no parser-blocking warning,
   and the UI still loads even if the chart library is slow or blocked. */
function loadPptxFallback(){
  if (typeof PptxGenJS !== "undefined") return;
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.min.js";
  document.head.appendChild(s);
}
</script>
<style>
  :root{
    --cream:#FBF5E2; --card:#FFFDF4; --maroon:#8B1414; --dmaroon:#6E0E0E;
    --gold:#C9A227; --golddk:#A8861B; --ink:#3B3B3B; --muted:#7a7468; --line:#E5D9A8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--cream); color:var(--ink); font:14px/1.5 "Segoe UI", system-ui, Arial, sans-serif; height:100vh; display:flex; flex-direction:column;}
  h1,h2,h3,.serif{font-family:Georgia,"Times New Roman",serif;}

  header{background:var(--maroon); color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; border-bottom:3px solid var(--gold); flex-wrap:wrap; flex:none;}
  .mark{width:30px;height:30px;border-radius:50%;background:#fff;border:2px solid var(--gold);flex:none;}
  header .t1{font-size:17px;}
  header .t2{font-size:10px; color:var(--gold); font-weight:600; letter-spacing:.12em; text-transform:uppercase;}
  header .grow{flex:1;}
  .btn{border:1.5px solid var(--gold); background:transparent; color:#fff; padding:6px 12px; border-radius:7px; cursor:pointer; font-weight:600; font-size:12.5px;}
  .btn:hover{background:rgba(255,255,255,.08);}
  .btn:focus-visible{outline:3px solid #fff; outline-offset:2px;}
  .btn.gold{background:var(--gold); border-color:var(--gold);}
  .btn.gold:hover{background:var(--golddk);}
  .btn.ghost{color:var(--maroon); border-color:var(--maroon);}
  .btn.ghost:hover{background:rgba(139,20,20,.06);}
  .btn.mini2{padding:3px 8px; font-size:11.5px;}
  .statusmsg{color:#fff; background:rgba(0,0,0,.18); border-radius:6px; padding:4px 10px; font-weight:600; font-size:12px;}
  .statusmsg:empty{display:none;}

  main{flex:1; display:grid; grid-template-columns:148px 252px minmax(300px,1fr) minmax(300px,420px); min-height:0;}
  @media (max-width:1200px){ main{grid-template-columns:130px 220px 1fr;} .zone4{display:none;} }
  @media (max-width:820px){ main{grid-template-columns:1fr; grid-auto-rows:min-content;} .zone1,.zone2{max-height:230px;} }
  .zone{min-height:0; overflow:auto; padding:12px;}
  .zone1{background:#F1E7C8; border-right:1px solid var(--line);}
  .zone2{background:#F6EFD9; border-right:1px solid var(--line);}
  .zone3{background:var(--cream);}
  .zone4{background:#F6EFD9; border-left:1px solid var(--line);}
  .ztitle{font-family:Georgia,serif; font-size:12px; color:var(--dmaroon); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; position:sticky; top:-12px; background:inherit; padding:6px 0; z-index:1;}

  .pvempty{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-style:italic; font-size:11px; text-align:center; padding:6px;}

  .palcard{margin-bottom:10px; cursor:grab; border:1px solid var(--line); border-radius:7px; background:var(--card); padding:5px;}
  .palcard:hover{border-color:var(--gold); box-shadow:0 2px 8px rgba(139,20,20,.10);}
  .palcard .thumb{position:relative; width:100%; aspect-ratio:16/9; container-type:inline-size; background:#fff; border-radius:4px; overflow:hidden;}
  .palcap{font-size:10.5px; font-weight:600; color:var(--dmaroon); text-align:center; margin-top:4px; line-height:1.2;}

  .lanecard{display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:6px; margin-bottom:8px; cursor:pointer;}
  .lanecard.sel{border-color:var(--gold); box-shadow:0 2px 10px rgba(139,20,20,.14);}
  .lanecard.dragging{opacity:.5;}
  .lanecard.dropabove{border-top:3px solid var(--gold);}
  .lnum{font-family:Georgia,serif; font-size:13px; font-weight:700; color:var(--gold); width:16px; text-align:center; flex:none;}
  .lthumb{position:relative; width:96px; aspect-ratio:16/9; container-type:inline-size; background:#fff; border:1px solid var(--line); border-radius:4px; overflow:hidden; flex:none;}
  .lmeta{flex:1; min-width:0;}
  .lty{font-size:9px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted);}
  .lnm{font-size:12px; font-weight:600; color:var(--dmaroon); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ltools{display:flex; flex-direction:column; gap:2px; flex:none;}
  .ltools button{border:none; background:none; color:var(--muted); cursor:pointer; font-size:12px; padding:1px 4px; border-radius:4px;}
  .ltools button:hover{color:var(--maroon); background:rgba(139,20,20,.08);}

  .zone3 h2{color:var(--dmaroon); font-size:17px; margin-bottom:2px;}
  .zone3 .sub{color:var(--muted); margin-bottom:12px; font-size:12px;}
  fieldset{border:1px solid var(--line); border-radius:10px; padding:11px 13px; margin-bottom:12px; background:var(--card);}
  legend{padding:0 7px; color:var(--maroon); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em;}
  label{display:block; font-size:11px; font-weight:600; color:var(--muted); margin:9px 0 3px;}
  select,input[type=text],textarea{width:100%; background:#fff; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font:inherit; color:var(--ink);}
  select:focus,input:focus,textarea:focus{outline:2px solid var(--gold);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 13px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:0 13px;}
  @media (max-width:560px){ .grid2,.grid3{grid-template-columns:1fr;} }
  .rowline{display:grid; gap:7px; margin-bottom:7px; align-items:center;}
  .rowline.t2{grid-template-columns:1fr 1fr 26px;}
  .rowline.t3{grid-template-columns:1.8fr 130px 1.8fr 26px;}
  .rowline.t4{grid-template-columns:60px 1.4fr 90px 2fr 26px;}
  .rowline input,.rowline select{padding:6px 8px; font-size:12.5px;}
  .delrow{border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;}
  .delrow:hover{color:var(--maroon);}
  .addbtn{margin-top:4px;font-size:12px;padding:5px 10px;}
  .imgslot{display:flex;align-items:center;gap:9px;margin-top:6px;flex-wrap:wrap;}
  .imgslot img{height:46px;border:2px solid var(--gold);border-radius:6px;background:#fff;}
  .orlbl{color:var(--muted);font-size:12px;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:7px;}

  #pv{position:relative; width:100%; aspect-ratio:16/9; container-type:inline-size; background:#fff; border:1px solid var(--line); border-radius:8px; overflow:hidden; box-shadow:0 3px 14px rgba(139,20,20,.10); font-family:Arial,sans-serif;}
  .pvnote{font-size:11px;color:var(--muted);margin:8px 0 14px;}
  .vtitle{font-family:Georgia,serif;font-size:12px;color:var(--dmaroon);text-transform:uppercase;letter-spacing:.06em;margin:6px 0 8px;}
  #variants{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .varcard{cursor:pointer;border:1px solid var(--line);border-radius:7px;background:var(--card);padding:4px;}
  .varcard.sel{border-color:var(--gold);box-shadow:0 2px 8px rgba(139,20,20,.12);}
  .varcard .vthumb{position:relative;width:100%;aspect-ratio:16/9;container-type:inline-size;background:#fff;border-radius:4px;overflow:hidden;}
  .vcap{font-size:10px;font-weight:600;color:var(--dmaroon);text-align:center;margin-top:3px;}

  .empty{color:var(--muted);font-style:italic;padding:14px 6px;text-align:center;}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important;} }
</style>
</head>
<body>

<header>
  <div class="mark" aria-hidden="true"></div>
  <div>
    <div class="t1 serif">OWOF Deck Builder</div>
    <div class="t2">One World One Family Mission</div>
  </div>
  <div class="grow"></div>
  <button class="btn" id="btnSample">Sample deck</button>
  <button class="btn" id="btnExport">Save (.json)</button>
  <button class="btn" id="btnImport">Open</button>
  <input type="file" id="importFile" accept=".json" hidden>
  <button class="btn gold" id="btnGen">Download PPTX</button>
  <span class="statusmsg" id="msg" role="status"></span>
</header>

<main>
  <section class="zone zone1" aria-label="Slide types">
    <div class="ztitle">Slide types</div>
    <div id="palette"></div>
  </section>

  <section class="zone zone2" aria-label="Your deck">
    <div class="ztitle">Your deck</div>
    <div id="lane"></div>
  </section>

  <section class="zone zone3" aria-label="Edit content">
    <div id="editor"></div>
  </section>

  <aside class="zone zone4" aria-label="Preview and design">
    <div class="ztitle">Preview</div>
    <div id="pv"></div>
    <p class="pvnote">Same measurements as the PowerPoint output.</p>
    <div class="vtitle">Design options</div>
    <div id="variants"></div>
  </aside>
</main>

<script src="app.js"></script>
<script src="theme-owof.js"></script>
<script src="template-hero.js"></script>
<script src="template-divider.js"></script>
<script src="template-overview.js"></script>
<script src="template-table.js"></script>
<script src="template-fin.js"></script>
<script src="template-photos.js"></script>
<script src="template-content.js"></script>
<script src="template-two_col.js"></script>
<script src="template-timeline.js"></script>
<script src="template-chart.js"></script>
<script src="template-compare.js"></script>
<script src="template-thanks.js"></script>
<script>OWOF.init();</script>
</body>
</html>
